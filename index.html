<!-- BAGIAN YANG DIREVISI ADA DI SHARE VIEW DAN REPORT HEADER -->
<!-- Seluruh kode lain tetap sama seperti yang kamu kirim -->

<!-- ====== SHARE OVERLAY ====== -->
<div class="share-overlay" id="shareOverlay">
  <div class="share-shell">

    <div class="share-topbar">
      <div class="share-topbar-left">
        <h2>Tampilan Laporan Tiket</h2>
        <p>Tampilan laporan tiket dalam format tabel yang siap dibagikan, dicetak, atau disimpan sebagai PDF.</p>
      </div>

      <div class="share-topbar-actions">
        <button class="btn btn-ghost btn-sm" onclick="copyActiveSummary()">
          <svg viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy Summary
        </button>

        <button class="btn btn-success btn-sm" onclick="printShareView()">
          <svg viewBox="0 0 24 24">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Print / Save PDF
        </button>

        <button class="btn btn-secondary btn-sm" onclick="closeShareView()">
          ✕ Tutup
        </button>
      </div>
    </div>

    <div class="share-content" id="shareContent"></div>
  </div>
</div>
