<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Monitoring - View</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f4f7fb;
margin:0;
padding:30px;
}

h1{
font-size:26px;
font-weight:800;
margin-bottom:5px;
}

p{
color:#64748b;
margin-bottom:25px;
}

.card{
background:#fff;
border-radius:12px;
padding:20px;
box-shadow:0 3px 14px rgba(0,0,0,0.06);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#eef4ff;
padding:10px;
font-size:12px;
text-transform:uppercase;
}

td{
padding:10px;
border-bottom:1px solid #eef2f7;
font-size:13px;
}

button{
padding:6px 12px;
border-radius:8px;
border:none;
cursor:pointer;
background:#4f46e5;
color:white;
font-weight:600;
}

.badge{
padding:4px 8px;
border-radius:20px;
font-size:11px;
font-weight:700;
}

.low{background:#dcfce7;color:#166534}
.medium{background:#fef3c7;color:#92400e}
.high{background:#fee2e2;color:#991b1b}

.check{background:#e0f2fe;color:#075985}
.process{background:#fef3c7;color:#92400e}
.done{background:#dcfce7;color:#166534}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:12px;
width:450px;
}

.modal.show{display:flex}
</style>
</head>

<body>

<h1>Ticket Monitoring</h1>
<p>Dashboard monitoring tiket ND6 & DMS</p>

<div class="card">

<table>
<thead>
<tr>
<th>#</th>
<th>Tanggal</th>
<th>No Tiket</th>
<th>Keluhan</th>
<th>Sistem</th>
<th>PIC</th>
<th>Priority</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableBody">
<tr>
<td colspan="9">Loading data...</td>
</tr>
</tbody>

</table>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3>Detail Tiket</h3>
<br>

<p><b>No Tiket:</b> <span id="dNo"></span></p>
<p><b>Tanggal:</b> <span id="dTgl"></span></p>
<p><b>Sistem:</b> <span id="dSys"></span></p>
<p><b>PIC:</b> <span id="dPic"></span></p>
<p><b>Priority:</b> <span id="dPr"></span></p>
<p><b>Status:</b> <span id="dSt"></span></p>

<br>

<p><b>Keluhan</b></p>
<p id="dKel"></p>

<br>

<p><b>Penyelesaian</b></p>
<p id="dSol"></p>

<br>

<button onclick="closeModal()">Tutup</button>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzhUphV8wXyUdU929zlxsJDF8U6kdr_Lw2KIzUTEiFnda5_Nxlj0VgQnIBFm2qhDbJo/exec"

let tickets=[]

function badgePriority(p){

if(p==="High") return '<span class="badge high">High</span>'
if(p==="Medium") return '<span class="badge medium">Medium</span>'
return '<span class="badge low">Low</span>'

}

function badgeStatus(s){

if(s==="DONE") return '<span class="badge done">DONE</span>'
if(s==="On Process") return '<span class="badge process">On Process</span>'
return '<span class="badge check">On Checking</span>'

}

function render(){

const tb=document.getElementById("tableBody")

tb.innerHTML=tickets.map((t,i)=>`

<tr>

<td>${i+1}</td>

<td>${t.tanggal}</td>

<td><b>${t.notiket}</b></td>

<td>${t.keluhan}</td>

<td>${t.sistem}</td>

<td>${t.pic}</td>

<td>${badgePriority(t.priority)}</td>

<td>${badgeStatus(t.status)}</td>

<td>
<button onclick="detail(${i})">Detail</button>
</td>

</tr>

`).join("")

}

function detail(i){

const t=tickets[i]

document.getElementById("dNo").textContent=t.notiket
document.getElementById("dTgl").textContent=t.tanggal
document.getElementById("dSys").textContent=t.sistem
document.getElementById("dPic").textContent=t.pic
document.getElementById("dPr").textContent=t.priority
document.getElementById("dSt").textContent=t.status
document.getElementById("dKel").textContent=t.keluhan
document.getElementById("dSol").textContent=t.penyelesaian

document.getElementById("modal").classList.add("show")

}

function closeModal(){

document.getElementById("modal").classList.remove("show")

}

async function load(){

const res=await fetch(API+"?action=get")

const json=await res.json()

tickets=json.data

render()

}

load()

</script>

</body>
</html>
