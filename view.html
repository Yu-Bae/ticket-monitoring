<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Monitoring View</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f1f5f9;
margin:0;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
font-size:26px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
}

th{
background:#1a56db;
color:white;
padding:12px;
font-size:13px;
text-align:left;
}

td{
padding:10px 12px;
border-bottom:1px solid #eee;
font-size:13px;
}

tr:hover{
background:#f8fafc;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:11px;
font-weight:600;
}

.done{background:#dcfce7;color:#166534;}
.process{background:#fef3c7;color:#92400e;}
.check{background:#dbeafe;color:#1e40af;}

.toolbar{
display:flex;
gap:10px;
margin-bottom:15px;
}

input,select{
padding:8px 10px;
border-radius:6px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="container">

<h1>Ticket Monitoring</h1>

<div class="toolbar">

<input id="search" placeholder="Cari tiket...">

<select id="filterSistem">
<option value="">Semua Sistem</option>
<option>ND6</option>
<option>DMS</option>
</select>

<select id="filterStatus">
<option value="">Semua Status</option>
<option>On Checking</option>
<option>On Process</option>
<option>DONE</option>
</select>

<button onclick="loadData()">Refresh</button>

</div>

<table>

<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>No Tiket</th>
<th>Keluhan</th>
<th>Sistem</th>
<th>PIC</th>
<th>Priority</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="8">Loading...</td></tr>
</tbody>

</table>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzhUphV8wXyUdU929zlxsJDF8U6kdr_Lw2KIzUTEiFnda5_Nxlj0VgQnIBFm2qhDbJo/exec";

let data=[];

async function loadData(){

const res=await fetch(SCRIPT_URL+"?action=get&t="+Date.now());
const json=await res.json();

data=json.data||[];

render();

}

function render(){

const q=document.getElementById("search").value.toLowerCase();
const sistem=document.getElementById("filterSistem").value;
const status=document.getElementById("filterStatus").value;

const filtered=data.filter(t=>

(!q || (t.NoTiket||"").toLowerCase().includes(q) || (t.Keluhan||"").toLowerCase().includes(q)) &&
(!sistem || t.Sistem===sistem) &&
(!status || t.Status===status)

);

const tbody=document.getElementById("tbody");

if(!filtered.length){

tbody.innerHTML=`<tr><td colspan="8">Tidak ada data</td></tr>`;
return;

}

tbody.innerHTML=filtered.map((t,i)=>{

const badge=

t.Status==="DONE"
?'<span class="badge done">DONE</span>'
:t.Status==="On Process"
?'<span class="badge process">On Process</span>'
:'<span class="badge check">On Checking</span>';

return `

<tr>

<td>${i+1}</td>
<td>${t.Tanggal||""}</td>
<td>${t.NoTiket||""}</td>
<td>${t.Keluhan||""}</td>
<td>${t.Sistem||""}</td>
<td>${t.PIC||""}</td>
<td>${t.Priority||""}</td>
<td>${badge}</td>

</tr>

`;

}).join("");

}

document.getElementById("search").addEventListener("input",render);
document.getElementById("filterSistem").addEventListener("change",render);
document.getElementById("filterStatus").addEventListener("change",render);

loadData();

</script>

</body>
</html>
